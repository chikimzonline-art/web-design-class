<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table in HTML</title>
</head>
<body>
    <h2>Table in HTML</h2>
    <table border="1">
        <tr>
            <th>Shift</th>
            <th>Monday</th>
            <th>Tuesday</th>
            <th>Wednesday</th>
        </tr>
        <tr>
            <th rowspan="2">Morning</th>
            <td>Alice</td>
            <td>Bob</td>
            <td>Charlie</td>
        </tr>
        <tr>
            <td>Dave</td>
            <td>Eve</td>
            <td>Frank</td>
        </tr>
        <tr>
            <th>Afternoon</th>
            <td>Grace</td>
            <td>Heidi</td>
            <td>Ivan</td>
        </tr>
        <tr>
            <th>Nigh Shift</th>
            <td colspan="3">Cafe closed for maintenance</td>
        </tr>
    </table>
</body>
</html>
